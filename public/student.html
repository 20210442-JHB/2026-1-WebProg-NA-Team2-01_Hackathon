<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>학생 피드백 게시판</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>🙋‍♂️ 학생 피드백 보내기</h2>
        <div class="form-box">
            <textarea id="fbInput" placeholder="익명으로 피드백을 남겨주세요."></textarea>
            <button class="sub-btn" onclick="submitFB()">피드백 제출</button>
        </div>
        <div id="studentList"></div>
    </div>

    <script>
        function submitFB() {
            const text = document.getElementById('fbInput').value;
            if(!text) return alert("내용을 입력하세요.");

            const feedbacks = JSON.parse(localStorage.getItem('feedbacks')) || [];
            feedbacks.push({ id: Date.now(), text: text, likes: 0 });
            localStorage.setItem('feedbacks', JSON.stringify(feedbacks));
            
            document.getElementById('fbInput').value = '';
            render();
        }

        function addLike(id) {
            let feedbacks = JSON.parse(localStorage.getItem('feedbacks')) || [];
            const target = feedbacks.find(f => f.id === id);
            if(target) {
                target.likes += 1;
                localStorage.setItem('feedbacks', JSON.stringify(feedbacks));
                render();
            }
        }

        function render() {
            const listArr = JSON.parse(localStorage.getItem('feedbacks')) || [];
            const listDiv = document.getElementById('studentList');
            listDiv.innerHTML = '';
            listArr.reverse().forEach(item => {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `
                    <span>${item.text}</span>
                    <button class="like-btn" onclick="addLike(${item.id})">👍 ${item.likes}</button>
                `;
                listDiv.appendChild(div);
            });
        }

        window.addEventListener('storage', render);
        window.onload = render;
    </script>
</body>
</html>
